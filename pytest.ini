[pytest]
# Explicitly adds the project root to Python's module search path
# before test collection begins. This is what allows tests/conftest.py
# to do `from app.main import app` correctly no matter how pytest is
# invoked — plain `pytest`, `python -m pytest`, or an IDE's built-in
# test runner (VS Code, PyCharm) — instead of relying on each
# invocation method's own inconsistent sys.path behavior.
pythonpath = .

# Restricts test discovery to the tests/ directory, so running
# a bare `pytest` from the project root (with no path argument)
# doesn't accidentally try to collect from notebook/ or elsewhere.
testpaths = tests
