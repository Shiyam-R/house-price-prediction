# ============================================================
# CI/CD PIPELINE — House Price Prediction API
# ============================================================
# Runs automatically on every push and every pull request.
# Any failed step fails the whole pipeline (GitHub Actions default).
#
# Three jobs:
#
#   JOB 1 — build-and-test (runs on every push and PR)
#     1. Checkout code
#     2. Setup Python
#     3. Install dependencies
#     4. Verify dependency graph is consistent
#     5. Validate Python syntax
#     6. Run unit tests
#     7. Build the Docker image
#        — this is the step that replaces local Docker Desktop
#          verification, since GitHub-hosted runners already
#          include Docker Engine.
#     8. Run the built image as a real container and poll /health
#        — proves the app actually starts and serves traffic,
#          not just that the image assembled successfully.
#
#   JOB 2 — security-scan (runs in parallel with build-and-test,
#           on every push and PR)
#     9. Scan Python dependencies with pip-audit (requirements.txt,
#        requirements-dev.txt, requirements-load.txt) against the
#        OSV vulnerability database
#     10. Build the image and scan it with Trivy for OS-level
#         package vulnerabilities in the base image — pip-audit
#         only sees Python packages, not the underlying Debian
#         packages python:3.13-slim ships with. Blocks the pipeline
#         (exit-code 1) only on CRITICAL/HIGH findings that have an
#         actual available fix (ignore-unfixed: true) — Debian slim
#         images routinely carry CVEs with no patch shipped yet,
#         and failing CI on those doesn't improve security, just
#         produces a permanently red pipeline for reasons outside
#         this project's control.
#     11. A second, non-blocking Trivy run reports ALL findings
#         (including unfixed ones) for visibility, without ever
#         failing the pipeline — so unfixed CVEs stay reviewable
#         rather than silently hidden.
#
#   JOB 3 — publish-image (only on pushes to main, only if BOTH
#           build-and-test AND security-scan fully passed)
#     11. Log in to GitHub Container Registry (GHCR)
#     12. Build and push the image, tagged :latest and :<commit-sha>
#        — this is the actual CD step. Job 1 only PROVES the image
#          works; job 3 makes it available for any other machine
#          to pull and run via `docker pull`. A real vulnerability
#          finding in job 2 now blocks this from happening at all.

name: CI/CD Pipeline

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # ── 1. CHECKOUT ────────────────────────────────────────
      # Pulls the repository contents onto the runner so later
      # steps have the actual code/files to work with.
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. SETUP PYTHON ────────────────────────────────────
      # Installs the same Python version used in the Dockerfile
      # and locally, so CI results reflect real-world behavior.
      # cache: 'pip' caches downloaded packages between runs,
      # meaningfully speeding up repeated CI runs.
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      # ── 3. INSTALL DEPENDENCIES ────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4. VERIFY REQUIREMENTS INSTALL CORRECTLY ───────────
      # pip check inspects installed packages for conflicting or
      # missing dependency requirements — a successful `pip install`
      # does not by itself guarantee a consistent environment.
      - name: Verify dependency consistency
        run: pip check

      # ── 5. VALIDATE PYTHON SYNTAX ──────────────────────────
      # Compiles every tracked .py file to catch syntax errors
      # early, before attempting to run anything. venv/ and
      # __pycache__/ are excluded since they're not source code
      # you maintain (venv/ shouldn't even be committed).
      - name: Validate Python syntax
        run: |
          find . -type f -name "*.py" \
            -not -path "*/venv/*" \
            -not -path "*/.venv/*" \
            -not -path "*/__pycache__/*" \
            -print0 | xargs -0 -n1 python -m py_compile

      # ── 6. RUN UNIT TESTS (IF AVAILABLE) ───────────────────
      # Runs pytest only if a tests/ directory exists. This keeps
      # the pipeline green today and will automatically start
      # enforcing real tests the moment a tests/ folder is added —
      # no changes to this workflow file required later.
      - name: Run unit tests
        run: |
          if [ -d "tests" ]; then
            pip install --no-cache-dir -r requirements-dev.txt
            pytest tests/ -v
          else
            echo "No tests/ directory found — skipping test execution."
            echo "This step will activate automatically once tests/ is added."
          fi

      # ── 7. BUILD DOCKER IMAGE ───────────────────────────────
      # ubuntu-latest runners come with Docker Engine pre-installed,
      # so no extra setup action is needed here. This step is the
      # authoritative verification that the Dockerfile is valid and
      # the image builds successfully — replacing the local Docker
      # Desktop check you can't run on this machine.
      - name: Build Docker image
        run: docker build -t house-price-api:${{ github.sha }} .

      # ── 8. RUN CONTAINER AND VERIFY /health ────────────────
      # A successful build only proves the image assembles correctly —
      # it says nothing about whether the app actually starts and
      # serves traffic. This step starts a real container from the
      # image just built, polls the existing /health endpoint with
      # retries (the container's own HEALTHCHECK has a 15s start
      # grace period, so the app needs a moment to load the pickled
      # artifacts), and fails the pipeline with container logs
      # printed if the app never becomes reachable. The container
      # is always cleaned up afterward, whether it passed or failed.
      - name: Run container and verify health endpoint
        run: |
          docker run -d --name test-container -p 8000:8000 house-price-api:${{ github.sha }}

          echo "Waiting for the API to become healthy..."
          success=false
          for i in $(seq 1 10); do
            if curl -sf http://localhost:8000/health; then
              echo ""
              echo "Health check passed on attempt $i."
              success=true
              break
            fi
            echo "Attempt $i failed, retrying in 3s..."
            sleep 3
          done

          if [ "$success" != "true" ]; then
            echo "Health check never succeeded. Container logs:"
            docker logs test-container
            docker stop test-container
            docker rm test-container
            exit 1
          fi

          docker stop test-container
          docker rm test-container

  # ── JOB 2 — SECURITY SCAN ────────────────────────────────────
  # Runs independently of build-and-test (no `needs:`), so it
  # doesn't wait on it — security scanning doesn't require the
  # app to already be proven working first. Two layers are
  # checked, since neither alone covers the other:
  #   - pip-audit: Python package vulnerabilities (requirements*.txt)
  #   - Trivy: OS-level package vulnerabilities in the built image's
  #     base layer (python:3.13-slim), which pip-audit cannot see
  #     since those aren't Python packages at all.
  security-scan:
    name: Security scan (dependencies + image)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      # ── PYTHON DEPENDENCY SCAN (pip-audit) ──────────────────
      # Checks every requirements file against the OSV vulnerability
      # database — not just requirements.txt (what ships in the
      # image), but also requirements-dev.txt and requirements-load.txt,
      # since a vulnerable dev/test-tooling dependency is still a
      # real supply-chain risk on any machine that installs it,
      # even though it never reaches the production image itself.
      - name: Install pip-audit
        run: pip install --no-cache-dir pip-audit

      - name: Audit requirements.txt (production dependencies)
        run: pip-audit -r requirements.txt

      - name: Audit requirements-dev.txt (test tooling)
        run: pip-audit -r requirements-dev.txt

      - name: Audit requirements-load.txt (load testing tooling)
        run: pip-audit -r requirements-load.txt

      # ── CONTAINER IMAGE SCAN (Trivy) ────────────────────────
      # Builds the image (a separate build from job 1's — GitHub
      # Actions runners don't share filesystem state between jobs)
      # and scans it for known vulnerabilities in OS-level packages
      # inherited from the python:3.13-slim base image, which
      # pip-audit has no visibility into at all.
      - name: Build Docker image for scanning
        run: docker build -t house-price-api:scan-${{ github.sha }} .

      # severity is scoped to CRITICAL and HIGH only — scanning the
      # full base OS image and failing on every LOW/MEDIUM finding
      # produces enough noise that real findings get ignored. This
      # keeps the check meaningful rather than something to click
      # past. exit-code: 1 means a genuine CRITICAL/HIGH finding
      # fails the pipeline, not just prints a report nobody reads.
      #
      # ignore-unfixed: true is deliberate and important. Debian's
      # slim base images routinely carry CVEs in OS packages
      # (bsdutils, perl-base, ncurses, etc.) for which Debian has
      # not yet shipped a patched version — Trivy reports these
      # with status "affected" or "fix_deferred" and an EMPTY
      # "Fixed Version" column. There is no available upgrade to
      # apply for these; failing CI on them doesn't improve
      # security, it just produces a permanently red pipeline for
      # reasons outside this project's control. ignore-unfixed
      # scopes the blocking check to vulnerabilities that DO have
      # a fix available and simply haven't been picked up yet
      # (e.g. by rebuilding against a newer base image) — that is
      # the genuinely actionable definition of "unpatched".
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: house-price-api:scan-${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'

      # Separate, NON-blocking scan for full visibility, including
      # unfixed vulnerabilities. This always prints its findings to
      # the job log (exit-code 0 — it can never fail the pipeline)
      # so unfixed CVEs remain visible for periodic manual review,
      # rather than being silently hidden by ignore-unfixed above.
      - name: Report all vulnerabilities, including unfixed (informational only)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: house-price-api:scan-${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: '0'

  # ── JOB 3 — PUBLISH IMAGE (CD) ──────────────────────────────
  # This is the actual "Continuous Deployment" half of the pipeline.
  # Job 1 only proves the image builds and runs correctly — the
  # image itself is discarded the moment that job's runner shuts
  # down. This job takes the same Dockerfile, rebuilds it, and
  # pushes it to GitHub Container Registry (GHCR) so it becomes a
  # real, pullable artifact any machine can retrieve with
  # `docker pull` — not just something proven inside CI.
  publish-image:
    name: Publish Docker image to GHCR
    runs-on: ubuntu-latest
    needs: [build-and-test, security-scan]
    # Only publish on pushes to main, and only after BOTH
    # build-and-test AND security-scan have fully succeeded (the
    # `needs:` line above enforces this) — this `if:` additionally
    # ensures pull requests never publish an image, since PR code
    # hasn't been merged/trusted yet.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # GHCR requires the image name to be lowercase, but GitHub
      # usernames/repo names can contain uppercase letters (e.g.
      # "Shiyam-R"). This converts it once and reuses it below.
      - name: Prepare lowercase image name
        run: echo "IMAGE_NAME_LOWER=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      # Authenticates using GitHub's own built-in GITHUB_TOKEN —
      # no separate account, secret, or password needs to be created
      # or stored manually for this to work.
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Builds the image again (this runner is separate from job 1's)
      # and pushes it under two tags:
      #   :latest         — always the most recent successful build
      #   :<commit-sha>    — a permanent, traceable snapshot, so a
      #                      specific historical version can always
      #                      be pulled back deliberately, not just
      #                      whatever :latest happens to be today.
      - name: Build and push image to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_NAME_LOWER }}:latest
            ghcr.io/${{ env.IMAGE_NAME_LOWER }}:${{ github.sha }}